name: Monitor draws and auto-publish

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      BREVO_API_KEY:     ${{ secrets.BREVO_API_KEY }}
      SENDER_EMAIL:      ${{ secrets.SENDER_EMAIL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: agents/requirements.txt

      - name: Install dependencies
        run: pip install -r agents/requirements.txt

      - name: Run draw monitor
        run: python agents/draw_monitor.py

      - name: Detect new draw
        id: detect
        run: |
          if [ -f data/new_draw_flag.json ]; then
            echo "new_draw=true" >> "$GITHUB_OUTPUT"
          else
            echo "new_draw=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run blog writer (draw article)
        if: steps.detect.outputs.new_draw == 'true'
        env:
          WRITER_MODE: draw_only
        run: python agents/blog_writer.py

      - name: Send draw alert email
        if: steps.detect.outputs.new_draw == 'true'
        env:
          NEWSLETTER_MODE: draw_alert
        run: python agents/newsletter_agent.py

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ draws.html blog.html posts/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(auto): update draws + publish [skip ci]"
            git push
          fi
