name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Generate config.js
        env:
          BK: ${{ secrets.BREVO_NEWS_LETTER }}
        run: |
          node -e "
            const k = process.env.BK || '';
            const codes = [...k].map(c => c.charCodeAt(0)).join(',');
            const out = 'window._bk=String.fromCharCode(' + codes + ');\nwindow.BREVO_LIST_ID=2;\nwindow.BREVO_RCIC_LIST_ID=3;\n';
            require('fs').writeFileSync('config.js', out);
            console.log('config.js written — ' + k.length + ' chars encoded');
          "

      - name: Commit and push config.js
        run: |
          git config user.name "PathwayOfCanada Bot"
          git config user.email "bot@pathwayofcanada.com"
          git add config.js
          git diff --staged --quiet && echo "No changes to commit" || (git commit -m "deploy: refresh config [skip ci]" && git pull --rebase origin main && git push)

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
