name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write encoded config to branch
        env:
          BK: ${{ secrets.BREVO_NEWS_LETTER }}
          LID: ${{ secrets.BREVO_LIST_ID || '2' }}
          RID: ${{ secrets.BREVO_RCIC_LIST_ID || '3' }}
        run: |
          ENCODED=$(printf '%s' "$BK" | base64 -w 0)
          cat > config.js << EOF
          window._bk = atob('${ENCODED}');
          window.BREVO_LIST_ID = ${LID:-2};
          window.BREVO_RCIC_LIST_ID = ${RID:-3};
          EOF
          git config user.name "PathwayOfCanada Bot"
          git config user.email "bot@pathwayofcanada.com"
          git add config.js
          git diff --staged --quiet || git commit -m "deploy: refresh config [skip ci]"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
