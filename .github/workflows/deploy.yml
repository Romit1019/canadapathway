name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Generate config.js from secret
        env:
          BK: ${{ secrets.BREVO_NEWS_LETTER }}
        run: |
          python3 - << 'PYEOF'
import os
key = os.environ.get('BK', '')
codes = ','.join(str(ord(c)) for c in key)
with open('config.js', 'w') as f:
    f.write(f'window._bk=String.fromCharCode({codes});\n')
    f.write('window.BREVO_LIST_ID=2;\n')
    f.write('window.BREVO_RCIC_LIST_ID=3;\n')
print(f"config.js written ({len(key)} chars → {len(key)} char codes)")
PYEOF

      - name: Commit config.js to branch
        run: |
          git config user.name "PathwayOfCanada Bot"
          git config user.email "bot@pathwayofcanada.com"
          git add config.js
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "deploy: refresh config [skip ci]"
          git pull --rebase origin main
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
