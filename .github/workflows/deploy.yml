name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Brevo config
        run: |
          printf "window.BREVO_KEY = '%s';\nwindow.BREVO_LIST_ID = %s;\nwindow.BREVO_RCIC_LIST_ID = %s;\n" \
            "${{ secrets.BREVO_KEY }}" \
            "${{ secrets.BREVO_LIST_ID || 2 }}" \
            "${{ secrets.BREVO_RCIC_LIST_ID || 3 }}" \
            > config.js
          echo "config.js injected — key length: $(wc -c < config.js) bytes"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
