name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Generate config.js
        env:
          BK: ${{ secrets.BREVO_NEWS_LETTER }}
        run: |
          node -e "
            const k = process.env.BK || '';
            const codes = [...k].map(c => c.charCodeAt(0)).join(',');
            const js = [
              'window._bk=String.fromCharCode(' + codes + ');',
              'window.BREVO_KEY=window._bk;',
              'window.BREVO_LIST_ID=2;',
              'window.BREVO_RCIC_LIST_ID=3;'
            ].join('\n') + '\n';
            require('fs').writeFileSync('config.js', js);
            console.log('config.js written — key length: ' + k.length);
          "

      - name: Commit and push config.js
        run: |
          git config user.name "PathwayOfCanada Bot"
          git config user.email "bot@pathwayofcanada.com"
          git add config.js
          if git diff --staged --quiet; then
            echo "config.js unchanged — no commit needed"
          else
            git commit -m "deploy: refresh config [skip ci]"
            git pull --rebase origin main
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
