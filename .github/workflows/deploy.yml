name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Generate config.js
        env:
          BK: ${{ secrets.BREVO_NEWS_LETTER }}
        run: |
          node -e "
            const k = process.env.BK || '';
            const x = 73;
            const nums = [...k].map(c => c.charCodeAt(0) ^ x).join(',');
            const js = 'window._bk=[' + nums + '].map(c=>String.fromCharCode(c^73)).join(\"\");\nwindow.BREVO_KEY=window._bk;\nwindow.BREVO_LIST_ID=2;\nwindow.BREVO_RCIC_LIST_ID=3;\n';
            require('fs').writeFileSync('config.js', js);
            console.log('Done — key length: ' + k.length);
          "
          cat config.js | head -1

      - name: Commit config.js
        run: |
          git config user.name "PathwayOfCanada Bot"
          git config user.email "bot@pathwayofcanada.com"
          git add config.js
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "deploy: refresh config [skip ci]"
            git pull --rebase origin main
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
