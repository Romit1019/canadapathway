name: Weekly newsletter digest

on:
  schedule:
    - cron: "0 13 * * 0"   # Sunday 13:00 UTC (09:00 ET / 18:30 IST)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: digest-${{ github.ref }}
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      BREVO_API_KEY:     ${{ secrets.BREVO_API_KEY }}
      SENDER_EMAIL:      ${{ secrets.SENDER_EMAIL }}
      NEWSLETTER_MODE: weekly_digest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: agents/requirements.txt

      - name: Install dependencies
        run: pip install -r agents/requirements.txt

      - name: Send weekly digest
        run: python agents/newsletter_agent.py

      - name: Commit log changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/email_log.json || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(newsletter): weekly digest log [skip ci]"
            git push
          fi
