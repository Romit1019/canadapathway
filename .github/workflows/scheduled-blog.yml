name: Scheduled blog writer

on:
  schedule:
    - cron: "0 14 * * 1,4"   # Mon & Thu, 14:00 UTC (10:00 ET / 19:30 IST)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: blog-${{ github.ref }}
  cancel-in-progress: false

jobs:
  write:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      WRITER_MODE: scheduled
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: agents/requirements.txt

      - name: Install dependencies
        run: pip install -r agents/requirements.txt

      - name: Run blog writer
        run: python agents/blog_writer.py

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add posts/ blog.html data/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(blog): publish scheduled article [skip ci]"
            git push
          fi
